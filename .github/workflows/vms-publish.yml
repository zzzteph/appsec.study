name: Publish VM images

# Builds every image under vms/ (one folder = one image, each with its own
# Dockerfile) as a multi-arch (amd64 + arm64) manifest and pushes :latest to
# the GitHub Container Registry (GHCR). New folders are picked up automatically
# - the matrix is discovered at runtime, nothing is hardcoded.

on:
  push:
    branches: [main]
    paths:
      - "vms/**"
      - ".github/workflows/vms-publish.yml"
  workflow_dispatch: {}

concurrency:
  group: vms-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Find every vms/<name> folder that contains a Dockerfile and emit a JSON
  # array consumed by the build matrix. Add a folder, get a new image - no edit
  # to this file required.
  discover:
    name: Discover images
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.find.outputs.images }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Find image folders
        id: find
        run: |
          images=$(
            find vms -mindepth 1 -maxdepth 1 -type d \
              -exec test -f '{}/Dockerfile' ';' -printf '%f\n' \
            | sort \
            | jq -R -s -c 'split("\n") | map(select(length > 0))'
          )
          echo "Discovered: $images"
          echo "images=$images" >> "$GITHUB_OUTPUT"

  build:
    name: Publish ${{ matrix.image }}
    needs: discover
    if: ${{ needs.discover.outputs.images != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJSON(needs.discover.outputs.images) }}
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Image names are lowercased automatically by metadata-action, so the
      # folder name (e.g. BoxCutter) maps to ghcr.io/<owner>/<repo>/boxcutter.
      # Only :latest is tagged.
      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}/${{ matrix.image }}
          tags: |
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: vms/${{ matrix.image }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Inspect manifest
        run: |
          tag=$(jq -cr '.tags[0]' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          docker buildx imagetools inspect "$tag"
